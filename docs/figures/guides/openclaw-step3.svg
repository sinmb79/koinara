<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw step 3</title>
  <desc id="desc">Use the dedicated OpenClaw provider commands to doctor, start, and claim.</desc>
  <rect width="1600" height="980" fill="#060b14"/>
  <rect x="70" y="84" width="1460" height="812" rx="34" fill="#09131d" stroke="#263548" stroke-width="2"/>
  <rect x="70" y="84" width="1460" height="74" rx="34" fill="#121c2a"/>
  <circle cx="118" cy="121" r="11" fill="#e56b6f"/>
  <circle cx="152" cy="121" r="11" fill="#f0b35a"/>
  <circle cx="186" cy="121" r="11" fill="#33e2d6"/>
  <text x="230" y="128" fill="#91a2c1" font-family="IBM Plex Mono, monospace" font-size="30">OpenClaw-backed provider flow</text>
  <text x="130" y="240" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ npm.cmd run provider:v2:openclaw:doctor</text>
  <text x="130" y="290" fill="#8ea0bf" font-family="IBM Plex Mono, monospace" font-size="24">Using .env.provider.local and node.config.v2-openclaw-mainnet.json</text>
  <text x="130" y="360" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ npm.cmd run provider:v2:openclaw:start</text>
  <text x="130" y="410" fill="#dfe7f5" font-family="IBM Plex Mono, monospace" font-size="24">OpenClaw generates the response. Koinara-node signs and submits it.</text>
  <text x="130" y="500" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ npm.cmd run provider:v2:openclaw:claim</text>
  <text x="130" y="550" fill="#dfe7f5" font-family="IBM Plex Mono, monospace" font-size="24">Claim after the epoch closes to mint active and work rewards.</text>
  <rect x="118" y="640" width="1350" height="180" rx="22" fill="#0d1826" stroke="#29425c"/>
  <text x="150" y="704" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="24">Verifier commands</text>
  <text x="150" y="754" fill="#dfe7f5" font-family="IBM Plex Mono, monospace" font-size="24">npm.cmd run verifier:v2:doctor  /  npm.cmd run verifier:v2:start  /  npm.cmd run verifier:v2:claim</text>
</svg>
