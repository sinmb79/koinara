<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Koinara node install step 1</title>
  <desc id="desc">Clone the repo into the current user home directory and use npm.cmd on PowerShell.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320"/>
      <stop offset="100%" stop-color="#07111b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="980" fill="#060b14"/>
  <rect x="70" y="84" width="1460" height="812" rx="34" fill="url(#bg)" stroke="#263548" stroke-width="2"/>
  <rect x="70" y="84" width="1460" height="74" rx="34" fill="#121c2a"/>
  <circle cx="118" cy="121" r="11" fill="#e56b6f"/>
  <circle cx="152" cy="121" r="11" fill="#f0b35a"/>
  <circle cx="186" cy="121" r="11" fill="#33e2d6"/>
  <text x="230" y="128" fill="#91a2c1" font-family="IBM Plex Mono, monospace" font-size="30">Windows PowerShell</text>
  <text x="130" y="240" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ cd %USERPROFILE%</text>
  <text x="130" y="302" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ git clone https://github.com/sinmb79/Koinara-node.git koinara-node</text>
  <text x="130" y="364" fill="#8ea0bf" font-family="IBM Plex Mono, monospace" font-size="26">Cloning into 'koinara-node'...</text>
  <text x="130" y="426" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ cd %USERPROFILE%\koinara-node</text>
  <text x="130" y="488" fill="#33e2d6" font-family="IBM Plex Mono, monospace" font-size="28">$ npm.cmd install</text>
  <text x="130" y="550" fill="#8ea0bf" font-family="IBM Plex Mono, monospace" font-size="26">added 42 packages, audited 43 packages in 3s</text>
  <text x="130" y="654" fill="#f0b35a" font-family="IBM Plex Mono, monospace" font-size="25">Why npm.cmd?</text>
  <text x="130" y="704" fill="#dfe7f5" font-family="IBM Plex Mono, monospace" font-size="24">PowerShell often blocks npm.ps1 with a security policy.</text>
  <text x="130" y="746" fill="#dfe7f5" font-family="IBM Plex Mono, monospace" font-size="24">npm.cmd avoids that error and works from a normal user shell.</text>
  <rect x="118" y="790" width="1350" height="72" rx="20" fill="#0e1826" stroke="#2d4158"/>
  <text x="150" y="835" fill="#f3ab2c" font-family="IBM Plex Mono, monospace" font-size="24">Recommended repo path</text>
  <text x="520" y="835" fill="#f5f7fb" font-family="IBM Plex Mono, monospace" font-size="24">C:\Users\&lt;current-user&gt;\koinara-node</text>
</svg>
